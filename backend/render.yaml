# render.yaml — Render deployment config
# This file tells Render how to build and start the backend.
# Python 3.11 is required — pydantic-core has no wheel for 3.14+

services:
  - type: web
    name: alhasan-portfolio-api
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CONTACT_EMAIL_TO
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
